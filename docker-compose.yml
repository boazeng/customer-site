services:
  customer-site:
    build: .
    container_name: customer-site
    restart: unless-stopped
    ports:
      - "127.0.0.1:8094:8000"   # localhost בלבד — Cloudflare Tunnel מתחבר מקומית
    env_file:
      - .env
    volumes:
      - ./database:/app/database  # auth.db + links.db שורדים restart
    networks:
      - default

networks:
  # MTU מוקטן — תגובות גדולות מ-Priority (PDF ב-base64) נקטעו ברשת OrbStack
  # בגלל PMTU blackhole; 1400 פותר את ה-"incomplete chunked read".
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"
